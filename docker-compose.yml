services:
  postgres:
    image: postgres:16-alpine
    container_name: villawe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: villawe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - villawe_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: villawe-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - villawe_redisdata:/data

volumes:
  villawe_pgdata:
  villawe_redisdata:
